<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Plate" />
    <meta name="description" content="Plate — Nutrition, Perfected. Personalized meal plans, macro tracking, and grocery lists." />

    <!-- Open Graph / iMessage / Social previews -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Plate — Nutrition, Perfected." />
    <meta property="og:description" content="Personalized meal plans, macro tracking, barcode scanning, and grocery lists — all in one beautiful app." />
    <meta property="og:image" content="https://plate-app.pages.dev/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://plate-app.pages.dev" />
    <meta property="og:site_name" content="Plate" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Plate — Nutrition, Perfected." />
    <meta name="twitter:description" content="Personalized meal plans, macro tracking, barcode scanning, and grocery lists." />
    <meta name="twitter:image" content="https://plate-app.pages.dev/og-image.png" />

    <link rel="manifest" href="/manifest.json" />
    <title>Plate — Nutrition, Perfected.</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});

          // When a new SW activates, reload immediately so users always get the latest build
          navigator.serviceWorker.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'SW_UPDATED') {
              window.location.reload();
            }
          });
        });
      }
    </script>
  </body>
</html>
